name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install toq
        run: curl -sSf https://toq.dev/install.sh | sh && echo "$HOME/.toq/bin" >> $GITHUB_PATH
      - run: go vet ./...
      - run: go test -v ./...
