name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
      - run: cargo install toq-cli --version "0.1.0-dev.1"
      - run: go vet ./...
      - run: go test -v ./...
